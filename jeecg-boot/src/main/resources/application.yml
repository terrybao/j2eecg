spring:
  application:
    name: jeecg-boot
  datasource:
    url: jdbc:mysql://localhost:3306/jeecg?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  cache:
    type: redis

server:
  port: 8080
  servlet:
    context-path: /jeecg

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: org.jeecgframework.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0

# Swagger配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# JWT配置
jwt:
  secret: jeecg_secret_key
  expire: 86400
  header: Authorization